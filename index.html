function getUrlVars()
{
    var vars = [], hash;
    var hashes = parent.document.location.href.slice(parent.document.location.href.indexOf('?') + 1).split('&');
    for(var i = 0; i < hashes.length; i++)
    {
        hash = hashes[i].split('=');
        vars.push(hash[0]);
        vars[hash[0]] = hash[1];
    }
    return vars;
}
