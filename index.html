<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Challan Auto Download</title>
</head>
<body>
    <script>
        function getUrlVars() {
            var vars = {}, hash;
            var hashes = window.location.href.slice(window.location.href.indexOf('?') + 1).split('&');
            for(var i = 0; i < hashes.length; i++) {
                hash = hashes[i].split('=');
                vars[hash[0]] = hash[1];
            }
            return vars;
        }

        window.onload = function() {
            var params = getUrlVars();
            var chNo = params["challanNo"];
            
            if (chNo) {
                var downloadUrl = 'https://challanverification.github.io/challan-downloader/PrintChallanSlipDetails?fileId=1P5Rj6JrZ1Wnxaefi_57GA7fi2kZibqn5&challanNo=' + chNo;
                
                var link = document.createElement('a');
                link.href = downloadUrl;
                link.download = 'Challan_Slip_' + chNo + '.pdf';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                document.body.innerHTML = '<h2 style="text-align:center; margin-top:50px; font-family:Arial;">ডাউনলোড শুরু হচ্ছে...<br>চালান নম্বর: ' + chNo + '</h2>';
            } else {
                document.body.innerHTML = '<h2 style="text-align:center; margin-top:50px; color:red; font-family:Arial;">চালান নম্বর পাওয়া যায়নি। লিঙ্কটি সঠিকভাবে ব্যবহার করুন।</h2>';
            }
        };
    </script>
</body>
</html>
